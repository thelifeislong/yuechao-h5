<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>粤超·广东足球梗王争霸</title>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
  background:#0a0a0f;color:#f0e6d2;overflow-x:hidden;line-height:1.6;
  -webkit-tap-highlight-color:transparent;
}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}

/* ===== CSS VARIABLES ===== */
:root{
  --red:#e63946;--red-deep:#c1121f;--gold:#ffd60a;--gold-soft:#f4a261;
  --dark:#0a0a0f;--dark-2:#16161f;--dark-3:#1e1e2e;--dark-4:#2a2a3e;
  --text:#f0e6d2;--text-dim:#8a8a9e;--text-bright:#ffffff;
  --green:#52b788;--blue:#4cc9f0;--purple:#b5179e;
  --gradient-red:linear-gradient(135deg,#e63946 0%,#c1121f 100%);
  --gradient-gold:linear-gradient(135deg,#ffd60a 0%,#f4a261 100%);
  --gradient-dark:linear-gradient(180deg,#0a0a0f 0%,#16161f 100%);
}

/* ===== LOADING SCREEN ===== */
#loading{
  position:fixed;inset:0;z-index:9999;background:var(--dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .6s ease;
}
#loading.hide{opacity:0;pointer-events:none}
.loading-ball{
  width:64px;height:64px;border-radius:50%;background:var(--gradient-red);
  position:relative;animation:ballBounce 1s ease-in-out infinite alternate;
  box-shadow:0 0 30px rgba(230,57,70,.5);
}
.loading-ball::after{
  content:'';position:absolute;top:30%;left:25%;width:50%;height:50%;
  border-radius:50%;background:rgba(255,255,255,.15);
}
@keyframes ballBounce{0%{transform:translateY(0) scale(1)}100%{transform:translateY(-40px) scale(1.05)}}
.loading-ball-shadow{
  width:50px;height:8px;border-radius:50%;background:rgba(230,57,70,.3);
  margin-top:10px;filter:blur(4px);animation:shadowPulse 1s ease-in-out infinite alternate;
}
@keyframes shadowPulse{0%{transform:scaleX(1);opacity:.3}100%{transform:scaleX(.5);opacity:.1}}
.loading-text{
  margin-top:30px;font-size:.9rem;color:var(--text-dim);text-align:center;
  min-height:1.5em;transition:opacity .3s;
}
.loading-title{
  margin-top:16px;font-size:1.6rem;font-weight:900;letter-spacing:2px;
  background:var(--gradient-gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}

/* ===== CONTAINER ===== */
#app{max-width:480px;margin:0 auto;position:relative;overflow:hidden}

/* ===== SECTION COMMON ===== */
.section{padding:60px 20px;position:relative}
.section-title{
  font-size:1.5rem;font-weight:900;text-align:center;margin-bottom:8px;
  letter-spacing:1px;
}
.section-subtitle{
  font-size:.85rem;color:var(--text-dim);text-align:center;margin-bottom:30px;
}
.section-divider{
  width:40px;height:3px;background:var(--gradient-gold);margin:0 auto 30px;
  border-radius:2px;
}

/* ===== HERO SECTION ===== */
.hero{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;padding:40px 20px;text-align:center;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 30%,rgba(230,57,70,.15) 0%,transparent 60%),
             radial-gradient(circle at 80% 70%,rgba(255,214,10,.08) 0%,transparent 50%);
}
.hero-badge{
  display:inline-block;padding:6px 16px;border:1px solid var(--gold);border-radius:20px;
  font-size:.75rem;color:var(--gold);margin-bottom:20px;letter-spacing:1px;
  animation:fadeInDown .8s ease;
}
.hero-title{
  font-size:3rem;font-weight:900;line-height:1.1;margin-bottom:12px;
  background:linear-gradient(180deg,#ffd60a 0%,#e63946 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:fadeInUp .8s ease .2s both;text-shadow:0 0 40px rgba(230,57,70,.3);
}
.hero-subtitle{
  font-size:1rem;color:var(--text-dim);margin-bottom:30px;
  animation:fadeInUp .8s ease .4s both;
}
.hero-stats{
  display:flex;gap:12px;animation:fadeInUp .8s ease .6s both;flex-wrap:wrap;justify-content:center;
}
.stat-card{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:12px 16px;min-width:90px;
}
.stat-num{font-size:1.4rem;font-weight:900;color:var(--gold)}
.stat-label{font-size:.7rem;color:var(--text-dim);margin-top:2px}
.hero-scroll{
  position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
  font-size:.7rem;color:var(--text-dim);animation:bounce 2s infinite;text-align:center;
}
.hero-scroll::after{content:'↓';display:block;margin-top:4px;font-size:1.2rem}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}

/* ===== QUIZ SECTION ===== */
.quiz-intro{
  text-align:center;margin-bottom:24px;
}
.quiz-container{
  background:var(--dark-2);border:1px solid rgba(255,255,255,.06);
  border-radius:20px;padding:24px 20px;position:relative;overflow:hidden;
}
.quiz-progress{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;
}
.quiz-progress-text{font-size:.8rem;color:var(--text-dim)}
.quiz-progress-bar{flex:1;height:6px;background:var(--dark-4);border-radius:3px;margin-left:12px;overflow:hidden}
.quiz-progress-fill{height:100%;background:var(--gradient-gold);border-radius:3px;transition:width .4s ease;width:0}
.quiz-question{
  font-size:1.2rem;font-weight:700;margin-bottom:6px;color:var(--text-bright);
}
.quiz-hint{font-size:.8rem;color:var(--text-dim);margin-bottom:20px}
.quiz-options{display:flex;flex-direction:column;gap:10px}
.quiz-option{
  background:var(--dark-3);border:1.5px solid rgba(255,255,255,.06);border-radius:14px;
  padding:14px 18px;font-size:.95rem;color:var(--text);cursor:pointer;
  transition:all .25s ease;display:flex;align-items:center;gap:12px;
}
.quiz-option:active{transform:scale(.98)}
.quiz-option .opt-label{
  width:28px;height:28px;border-radius:50%;background:var(--dark-4);
  display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;
  flex-shrink:0;transition:all .25s;
}
.quiz-option.correct{border-color:var(--green);background:rgba(82,183,136,.15)}
.quiz-option.correct .opt-label{background:var(--green);color:#fff}
.quiz-option.wrong{border-color:var(--red);background:rgba(230,57,70,.15)}
.quiz-option.wrong .opt-label{background:var(--red);color:#fff}
.quiz-option.disabled{pointer-events:none;opacity:.5}
.quiz-option.disabled.correct,.quiz-option.disabled.wrong{opacity:1}
.quiz-feedback{
  margin-top:16px;padding:14px;border-radius:12px;font-size:.85rem;
  display:none;animation:fadeInUp .4s ease;
}
.quiz-feedback.show{display:block}
.quiz-feedback.correct{background:rgba(82,183,136,.1);border:1px solid rgba(82,183,136,.3);color:var(--green)}
.quiz-feedback.wrong{background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.3);color:var(--red)}
.quiz-next{
  margin-top:16px;width:100%;padding:14px;border:none;border-radius:14px;
  background:var(--gradient-gold);color:var(--dark);font-size:1rem;font-weight:700;
  cursor:pointer;transition:all .25s;display:none;
}
.quiz-next.show{display:block;animation:fadeInUp .4s ease}
.quiz-next:active{transform:scale(.98)}
.quiz-result{
  text-align:center;padding:20px 0;display:none;
}
.quiz-result.show{display:block;animation:fadeInUp .5s ease}
.quiz-result-score{
  font-size:3rem;font-weight:900;background:var(--gradient-gold);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.quiz-result-title{font-size:1.2rem;font-weight:700;margin:8px 0}
.quiz-result-desc{font-size:.85rem;color:var(--text-dim);margin-bottom:20px}
.quiz-restart{
  padding:12px 28px;border:1.5px solid var(--gold);border-radius:24px;background:transparent;
  color:var(--gold);font-size:.9rem;cursor:pointer;transition:all .25s;
}
.quiz-restart:active{transform:scale(.98)}

/* ===== CITY CARDS ===== */
.city-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.city-card{
  background:var(--dark-2);border:1px solid rgba(255,255,255,.06);border-radius:16px;
  padding:18px 14px;position:relative;overflow:hidden;cursor:pointer;
  transition:all .3s ease;
}
.city-card:active{transform:scale(.97)}
.city-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--city-color,var(--red));border-radius:16px 16px 0 0;
}
.city-name{font-size:1.1rem;font-weight:900;margin-bottom:4px;color:var(--text-bright)}
.city-tag{font-size:.7rem;color:var(--city-color,var(--red));margin-bottom:10px;font-weight:600}
.city-quote{font-size:.78rem;color:var(--text-dim);line-height:1.5}
.city-card .city-emoji{position:absolute;top:12px;right:12px;font-size:1.2rem;opacity:.6}

/* ===== POSTER GALLERY ===== */
.gallery-scroll{
  display:flex;gap:14px;overflow-x:auto;padding:4px 20px 12px;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;-ms-overflow-style:none;
}
.gallery-scroll::-webkit-scrollbar{display:none}
.gallery-item{
  flex-shrink:0;width:260px;scroll-snap-align:center;
  border-radius:16px;overflow:hidden;position:relative;
  background:var(--dark-2);border:1px solid rgba(255,255,255,.06);
}
.gallery-item img{width:100%;height:auto;transition:transform .3s}
.gallery-item:active img{transform:scale(1.03)}
.gallery-caption{
  padding:12px 14px;
}
.gallery-caption-title{font-size:.9rem;font-weight:700;color:var(--gold)}
.gallery-caption-desc{font-size:.72rem;color:var(--text-dim);margin-top:2px}

/* ===== MEME WALL ===== */
.meme-wall{display:flex;flex-direction:column;gap:10px}
.meme-item{
  background:var(--dark-2);border-left:3px solid var(--gold);border-radius:0 12px 12px 0;
  padding:12px 16px;font-size:.9rem;color:var(--text);position:relative;
  transition:all .3s;
}
.meme-item:active{background:var(--dark-3);transform:translateX(4px)}
.meme-item .meme-tag{
  display:inline-block;font-size:.65rem;padding:2px 8px;border-radius:10px;
  background:rgba(255,214,10,.15);color:var(--gold);margin-bottom:6px;font-weight:600;
}

/* ===== SHARE SECTION ===== */
.share-section{
  text-align:center;padding:50px 20px 60px;
  background:radial-gradient(circle at 50% 50%,rgba(230,57,70,.1) 0%,transparent 70%);
}
.share-title{
  font-size:1.8rem;font-weight:900;margin-bottom:12px;
  background:var(--gradient-gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.share-desc{font-size:.85rem;color:var(--text-dim);margin-bottom:24px}
.share-btn{
  display:inline-block;padding:14px 36px;border-radius:28px;
  background:var(--gradient-red);color:#fff;font-size:1rem;font-weight:700;
  cursor:pointer;transition:all .25s;border:none;
  box-shadow:0 4px 20px rgba(230,57,70,.4);
}
.share-btn:active{transform:scale(.97)}
.share-footer{
  margin-top:30px;font-size:.7rem;color:var(--text-dim);line-height:1.8;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.reveal{opacity:0;transform:translateY(30px);transition:opacity .6s ease,transform .6s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* ===== PARTICLES ===== */
.particle{position:absolute;border-radius:50%;pointer-events:none;opacity:.3}
</style>
</head>

<div id="loading">
  <div class="loading-ball"></div>
  <div class="loading-ball-shadow"></div>
  <div class="loading-text" id="loadingText">波都未踢，茶先饮紧...</div>

<div id="app">

<script>
// === LOADING ===
const loadingTexts=[
  '波都未踢，茶先饮紧...',
  '醒狮换紧衫，等阵出场...',
  '讲波佬润紧喉咙...',
  '球迷买紧烧鹅腿入场...'
];
let ltIdx=0;
const ltEl=document.getElementById('loadingText');
const ltTimer=setInterval(()=>{
  ltIdx=(ltIdx+1)%loadingTexts.length;
  ltEl.style.opacity=0;
  setTimeout(()=>{ltEl.textContent=loadingTexts[ltIdx];ltEl.style.opacity=1},300);
},1800);

window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('loading').classList.add('hide');
    clearInterval(ltTimer);
    initApp();
  },2000);
});

// === DATA ===
const quizData=[

  {q:'「执死鸡」是什么意思？',hint:'含"鸡"字，但不是真的抓鸡',options:['抓住一只鸡','补射空门得分','胆小如鸡不敢踢','把球踢成鸡形'],answer:1,explain:'执死鸡 = 别人射门失败后你补射空门得分，捡了个大便宜！广东人叫"执到宝"🐔'},

  {q:'「通坑渠」是什么意思？',hint:'跟水渠有关，跟穿过去有关',options:['疏通下水道','带球穿过对方两腿之间','球掉进坑渠','踩过坑渠踢球'],answer:1,explain:'通坑渠 = 带球穿过对方球员两腿之间（穿裆），技高人胆大的过人方式⚡'},

];

  {file:'poster-8-shi-chu-jue-sha.png',title:'石出绝杀',desc:'美漫英雄，云浮绝杀广州'}
];

  {tag:'谐音梗',text:'粤饮粤强 = 越饮越强，饮完靓茶踢波劲过老虎'},

// === QUIZ ===
let quizIdx=0,quizScore=0,quizAnswered=false;
function buildQuiz(){
  renderQuestion();
}
function renderQuestion(){
  quizIdx=0;quizScore=0;quizAnswered=false;
  showQuestion();
}
function showQuestion(){
  if(quizIdx>=quizData.length){showQuizResult();return}
  const q=quizData[quizIdx];
  const body=document.getElementById('quizBody');
  document.getElementById('quizProgressText').textContent=`第 ${quizIdx+1} / ${quizData.length} 题`;
  document.getElementById('quizProgressFill').style.width=`${(quizIdx/quizData.length)*100}%`;
  quizAnswered=false;
  let optsHTML='';
  const labels=['A','B','C','D'];
  q.options.forEach((opt,i)=>{
    optsHTML+=`<div class="quiz-option" onclick="answerQuiz(${i})"><span class="opt-label">${labels[i]}</span><span>${opt}</span></div>`;
  });
  body.innerHTML=`
    <div class="quiz-question">${q.q}</div>
    <div class="quiz-hint">💡 ${q.hint}</div>
    <div class="quiz-options">${optsHTML}</div>
    <div class="quiz-feedback" id="quizFeedback"></div>
    <button class="quiz-next" id="quizNext" onclick="nextQuestion()">${quizIdx<quizData.length-1?'下一题':'查看结果 →'}</button>
  `;
}
function answerQuiz(i){
  if(quizAnswered)return;
  quizAnswered=true;
  const q=quizData[quizIdx];
  const opts=document.querySelectorAll('.quiz-option');
  opts.forEach((el,idx)=>{
    el.classList.add('disabled');
    if(idx===q.answer)el.classList.add('correct');
    if(idx===i&&i!==q.answer)el.classList.add('wrong');
  });
  const fb=document.getElementById('quizFeedback');
  if(i===q.answer){
    quizScore++;
    fb.className='quiz-feedback show correct';
    fb.innerHTML='✅ 答对了！'+q.explain;
  }else{
    fb.className='quiz-feedback show wrong';
    fb.innerHTML='❌ 错了！正确答案：'+q.options[q.answer]+'。'+q.explain;
  }
  document.getElementById('quizNext').classList.add('show');
}
function nextQuestion(){
  quizIdx++;
  showQuestion();
}
function showQuizResult(){
  document.getElementById('quizProgressFill').style.width='100%';
  document.getElementById('quizProgressText').textContent='挑战完成！';
  const body=document.getElementById('quizBody');
  let title,desc;
  if(quizScore>=9){title='粤超梗王！';desc='你对粤语足球文化了如指掌，系真正嘅广东球迷！🏆'}
  else if(quizScore>=7){title='资深球迷';desc:'好嘢！粤语足球术语难唔到你，继续努力！💪'}
  else if(quizScore>=5){title:'入门球迷';desc:'都算识嘢嘅，多D睇粤超就梗王啦！⚽'}
  else if(quizScore>=3){title='路过的靓仔';desc:'睇嚟你要多饮几杯茶补下课咯～🍵'}
  else{title='波都不识踢';desc='你都系乖乖饮茶算啦，踢波唔啱你😂'}
  body.innerHTML=`
    <div class="quiz-result show">
      <div class="quiz-result-score">${quizScore}/${quizData.length}</div>
      <div class="quiz-result-title">${title}</div>
      <div class="quiz-result-desc">${desc}</div>
      <button class="quiz-restart" onclick="renderQuestion()">再战一次 🔄</button>
    </div>
  `;
}

// === MEMES ===
function buildMemes(){
  const wall=document.getElementById('memeWall');
  wall.innerHTML=memeData.map((m,i)=>`
    <div class="meme-item" style="animation:fadeInUp .4s ease ${i*0.05}s both">
      <span class="meme-tag">${m.tag}</span>
      <div>${m.text}</div>
    </div>
  `).join('');
}

// === REVEAL ON SCROLL ===
function initReveal(){
  const observer=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){e.target.classList.add('visible')}
    });
  },{threshold:0.1});
  document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));
}

// === SHARE ===
function shareAction(){
  if(navigator.share){
    navigator.share({title:'粤超·广东足球梗王争霸',text:'波系圆嘅，乜都有可能！粤超联赛AI创意H5',url:location.href});
  }else{
    const btn=event.currentTarget;
    const orig=btn.textContent;
    btn.textContent='已复制链接 ✓';
    const ta=document.createElement('textarea');
    ta.value=location.href;document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy')}catch(e){}
    document.body.removeChild(ta);
    setTimeout(()=>btn.textContent=orig,2000);
  }
}
