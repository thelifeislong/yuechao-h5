<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>粤超·广东足球梗王争霸</title>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:#0a0a0a;
  color:#f0e6d2;overflow-x:hidden;line-height:1.6;
  -webkit-tap-highlight-color:transparent;
  position:relative;
}
/* 背景容器：裁剪 + GPU 合成层 */
.bg-wrap{
  position:fixed;inset:0;z-index:-3;pointer-events:none;overflow:hidden;
  background:linear-gradient(165deg, #0a0a0a 0%, #0d1a0f 35%, #080808 65%, #0a0a0a 100%);
  transform:translateZ(0);
}
/* 动态底色层：仅 background-position 动画，开销低 */
.bg-base{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 15% 85%, rgba(0,180,60,0.18) 0%, transparent 55%),
    radial-gradient(ellipse 60% 40% at 85% 15%, rgba(255,255,255,0.06) 0%, transparent 50%),
    radial-gradient(ellipse 50% 60% at 50% 50%, rgba(0,120,40,0.08) 0%, transparent 70%),
    linear-gradient(165deg, #0a0a0a 0%, #0d1a0f 35%, #080808 65%, #0a0a0a 100%);
  background-size:200% 200%, 200% 200%, 100% 100%, 100% 100%;
  animation:bgFlow 16s ease-in-out infinite alternate;
}
/* 草皮条纹：纯 CSS，零滤镜 */
.bg-grass{
  position:absolute;inset:0;
  background:repeating-linear-gradient(180deg,
    rgba(0,45,18,0.16) 0px, rgba(0,45,18,0.16) 34px,
    rgba(0,70,30,0.24) 34px, rgba(0,70,30,0.24) 68px);
  opacity:0.8;
}
/* 球场标线：静态 SVG，无滤镜/无 transform 动画 */
.bg-pitch{
  position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20400%20800%22%3E%3Cg%20fill%3D%22none%22%20stroke%3D%22%23fff%22%20stroke-width%3D%222.5%22%20opacity%3D%220.32%22%3E%3Crect%20x%3D%2216%22%20y%3D%2216%22%20width%3D%22368%22%20height%3D%22768%22%2F%3E%3Cline%20x1%3D%2216%22%20y1%3D%22400%22%20x2%3D%22384%22%20y2%3D%22400%22%2F%3E%3Ccircle%20cx%3D%22200%22%20cy%3D%22400%22%20r%3D%2274%22%2F%3E%3Crect%20x%3D%2292%22%20y%3D%2216%22%20width%3D%22216%22%20height%3D%22128%22%2F%3E%3Crect%20x%3D%22132%22%20y%3D%2216%22%20width%3D%22136%22%20height%3D%2252%22%2F%3E%3Crect%20x%3D%2292%22%20y%3D%22656%22%20width%3D%22216%22%20height%3D%22128%22%2F%3E%3Crect%20x%3D%22132%22%20y%3D%22732%22%20width%3D%22136%22%20height%3D%2252%22%2F%3E%3C%2Fg%3E%3Ccircle%20cx%3D%22200%22%20cy%3D%22400%22%20r%3D%225%22%20fill%3D%22%23fff%22%20opacity%3D%220.35%22%2F%3E%3Cg%20fill%3D%22none%22%20stroke%3D%22%23fff%22%20stroke-width%3D%222%22%20opacity%3D%220.22%22%3E%3Cpath%20d%3D%22M16%2046%20A30%2030%200%200%201%2046%2016%22%2F%3E%3Cpath%20d%3D%22M354%2016%20A30%2030%200%200%201%20384%2046%22%2F%3E%3Cpath%20d%3D%22M384%20754%20A30%2030%200%200%201%20354%20784%22%2F%3E%3Cpath%20d%3D%22M46%20784%20A30%2030%200%200%201%2016%20754%22%2F%3E%3C%2Fg%3E%3C%2Fsvg%3E");
  background-size:100% 100%;
  background-position:center;
  background-repeat:no-repeat;
}
@keyframes bgFlow{
  0%{background-position:0% 0%, 100% 100%, 20% 80%, center}
  50%{background-position:50% 80%, 50% 20%, 80% 30%, center}
  100%{background-position:100% 100%, 0% 0%, 60% 70%, center}
}
/* 浮动光斑层 */
.bg-orbs{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(40px);opacity:0.4;animation:orbFloat var(--dur,20s) ease-in-out infinite}
.orb-1{width:240px;height:240px;background:rgba(255,0,85,0.26);top:5%;left:3%;--dur:20s}
.orb-2{width:200px;height:200px;background:rgba(255,214,10,0.22);top:50%;right:3%;--dur:24s;animation-delay:-3s}
.orb-3{width:220px;height:220px;background:rgba(0,240,255,0.2);bottom:5%;left:15%;--dur:22s;animation-delay:-7s}
.orb-4{width:160px;height:160px;background:rgba(0,200,80,0.18);top:25%;right:20%;--dur:26s;animation-delay:-11s}
.orb-5{width:120px;height:120px;background:rgba(255,255,255,0.1);bottom:30%;right:8%;--dur:18s;animation-delay:-5s}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0)}
  50%{transform:translate(12px,-16px)}
}
@media (prefers-reduced-motion:reduce){
  .bg-base,.orb{animation:none!important}
}
img{max-width:100%;display:block}

/* ===== CSS VARIABLES ===== */
:root{
  --neon-red: #ff0055;
  --neon-blue: #00f0ff;
  --neon-gold: #ffd60a;
  --glass-bg: rgba(18, 18, 24, 0.55);
  --glass-border: rgba(255, 255, 255, 0.14);
  --glass-highlight: rgba(255, 255, 255, 0.08);
  --text-bright: #ffffff;
  --text-dim: #b8c0cc;
}

/* ===== LOADING SCREEN ===== */
#loading{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(160deg, #0a0a0a 0%, #111 50%, #0a1208 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .6s ease;
}
#loading.hide{opacity:0;pointer-events:none}

/* 加载页足球 emoji */
.loading-ball{
  width:80px;height:80px;position:relative;
  display:flex;align-items:center;justify-content:center;
  font-size:4.5rem;line-height:1;
  animation:ballBounce 0.75s ease-in-out infinite alternate;
  filter:drop-shadow(0 8px 20px rgba(0,0,0,0.6)) drop-shadow(0 0 18px rgba(255,255,255,0.15));
}
@keyframes ballBounce{0%{transform:translateY(0) scale(1)}100%{transform:translateY(-45px) scale(1.04)}}
.loading-ball-shadow{
  width:55px;height:8px;border-radius:50%;background:rgba(0,0,0,0.6);
  margin-top:12px;filter:blur(4px);animation:shadowPulse 0.75s ease-in-out infinite alternate;
}
@keyframes shadowPulse{0%{transform:scaleX(1);opacity:.7}100%{transform:scaleX(.4);opacity:.1}}
.loading-comments{
  margin-top:28px;width:100%;max-width:340px;padding:0 20px;
}
.loading-comment{
  padding:10px 14px;border-radius:12px;text-align:center;
  min-height:52px;display:flex;align-items:center;justify-content:center;
  font-size:.82rem;font-weight:600;line-height:1.45;
  color:var(--neon-gold);
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  text-shadow:0 0 8px rgba(255,214,10,0.4);
  transition:opacity .15s ease;
  animation:commentBounce .85s ease-in-out infinite alternate;
}
@keyframes commentBounce{
  0%{transform:translateY(0) scale(1)}
  100%{transform:translateY(-8px) scale(1.02)}
}
.loading-title{
  margin-top:16px;font-size:1.9rem;font-weight:900;letter-spacing:4px;
  color: #fff; text-shadow: 0 0 10px var(--neon-red), 0 0 20px var(--neon-red);
}

/* ===== APP CONTAINER ===== */
#app{
  max-width:480px;margin:0 auto;position:relative;overflow:hidden;padding:0 16px;
  background:linear-gradient(to bottom, rgba(8,10,12,0.78) 0%, rgba(10,12,16,0.84) 50%, rgba(8,10,12,0.86) 100%);
  box-shadow:0 0 40px rgba(0,0,0,0.9), inset 0 0 80px rgba(255,255,255,0.02);
  min-height:100vh;
  isolation:isolate;
}

/* ===== SECTION COMMON ===== */
.section{padding:45px 2px;position:relative}
.section-title{
  font-size:1.7rem;font-weight:900;text-align:center;margin-bottom:6px;
  color:#fff;letter-spacing:1px;
  text-shadow:0 0 6px #fff,-2px 0 14px var(--neon-red),0 0 18px var(--neon-gold),2px 0 14px var(--neon-blue);
}
.section-subtitle{
  font-size:.85rem;color:var(--text-dim);text-align:center;margin-bottom:24px;
  text-transform: uppercase; letter-spacing: 1px;
}

/* ===== MAO BO LI PANEL (毛玻璃组件) ===== */
.glass-panel{
  background:linear-gradient(145deg, rgba(255,255,255,0.09) 0%, var(--glass-bg) 40%, rgba(0,0,0,0.35) 100%);
  backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
  border:1px solid var(--glass-border);
  border-top:1px solid rgba(255,255,255,0.22);
  border-radius:20px;
  box-shadow:0 8px 32px rgba(0,0,0,0.55), inset 0 1px 0 var(--glass-highlight), inset 0 -1px 0 rgba(0,0,0,0.2);
}

/* ===== HERO SECTION ===== */
.hero{
  min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;padding:30px 4px;text-align:center;
}
.hero-badge{
  display:inline-block;padding:6px 16px;
  background: rgba(255, 0, 85, 0.15);
  border:1px solid var(--neon-red);border-radius:20px;
  font-size:.75rem;color:#fff;margin-bottom:20px;letter-spacing:1px;
  text-shadow: 0 0 5px var(--neon-red);
  box-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
}
.hero-title{
  font-size:3.4rem;font-weight:900;line-height:1.1;margin-bottom:16px;
  color: #fff;
  text-shadow: 0 0 7px #fff, 0 0 15px var(--neon-red), 0 0 30px var(--neon-red);
  animation: neonBlink 3s infinite alternate;
}
@keyframes neonBlink {
  0%, 92%, 100% { text-shadow: 0 0 7px #fff, 0 0 15px var(--neon-red), 0 0 30px var(--neon-red); }
  95% { text-shadow: 0 0 2px #fff, 0 0 5px var(--neon-red), 0 0 10px var(--neon-red); opacity: 0.85; }
}
.hero-subtitle{
  font-size:1.05rem;color:#fff;margin-bottom:35px;
  text-shadow: 0 0 8px rgba(255,214,10,0.8); font-weight: bold;
}
.hero-stats{
  display:flex;gap:10px;width:100%;justify-content:center;
  background:none;border:none;box-shadow:none;backdrop-filter:none;
}
.stat-card{
  flex:1;min-width:0;padding:16px 8px;text-align:center;cursor:pointer;
  border:1.5px solid rgba(255,255,255,0.1)!important;
  transition:border-color .35s ease,box-shadow .35s ease,transform .25s ease,background .35s ease;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.stat-card:active{transform:scale(0.96)}
.stat-card.stat-red:hover,.stat-card.stat-red.active,.stat-card.stat-red:focus-visible{
  border-color:var(--neon-red)!important;
  box-shadow:0 0 18px rgba(255,0,85,0.55),0 0 36px rgba(255,0,85,0.25),inset 0 0 24px rgba(255,0,85,0.08)!important;
  background:linear-gradient(145deg,rgba(255,0,85,0.12) 0%,var(--glass-bg) 50%,rgba(0,0,0,0.35) 100%)!important;
  animation:neonPulseRed 1.8s ease-in-out infinite;
}
.stat-card.stat-gold:hover,.stat-card.stat-gold.active,.stat-card.stat-gold:focus-visible{
  border-color:var(--neon-gold)!important;
  box-shadow:0 0 18px rgba(255,214,10,0.55),0 0 36px rgba(255,214,10,0.25),inset 0 0 24px rgba(255,214,10,0.08)!important;
  background:linear-gradient(145deg,rgba(255,214,10,0.12) 0%,var(--glass-bg) 50%,rgba(0,0,0,0.35) 100%)!important;
  animation:neonPulseGold 1.8s ease-in-out infinite;
}
.stat-card.stat-blue:hover,.stat-card.stat-blue.active,.stat-card.stat-blue:focus-visible{
  border-color:var(--neon-blue)!important;
  box-shadow:0 0 18px rgba(0,240,255,0.55),0 0 36px rgba(0,240,255,0.25),inset 0 0 24px rgba(0,240,255,0.08)!important;
  background:linear-gradient(145deg,rgba(0,240,255,0.1) 0%,var(--glass-bg) 50%,rgba(0,0,0,0.35) 100%)!important;
  animation:neonPulseBlue 1.8s ease-in-out infinite;
}
@keyframes neonPulseRed{0%,100%{box-shadow:0 0 18px rgba(255,0,85,0.55),0 0 36px rgba(255,0,85,0.25),inset 0 0 24px rgba(255,0,85,0.08)}50%{box-shadow:0 0 28px rgba(255,0,85,0.75),0 0 50px rgba(255,0,85,0.35),inset 0 0 30px rgba(255,0,85,0.12)}}
@keyframes neonPulseGold{0%,100%{box-shadow:0 0 18px rgba(255,214,10,0.55),0 0 36px rgba(255,214,10,0.25),inset 0 0 24px rgba(255,214,10,0.08)}50%{box-shadow:0 0 28px rgba(255,214,10,0.75),0 0 50px rgba(255,214,10,0.35),inset 0 0 30px rgba(255,214,10,0.12)}}
@keyframes neonPulseBlue{0%,100%{box-shadow:0 0 18px rgba(0,240,255,0.55),0 0 36px rgba(0,240,255,0.25),inset 0 0 24px rgba(0,240,255,0.08)}50%{box-shadow:0 0 28px rgba(0,240,255,0.75),0 0 50px rgba(0,240,255,0.35),inset 0 0 30px rgba(0,240,255,0.12)}}
.stat-card:nth-child(1) .stat-num{color:var(--neon-red);text-shadow:0 0 8px rgba(255,0,85,0.55)}
.stat-card:nth-child(2) .stat-num{color:var(--neon-gold);text-shadow:0 0 8px rgba(255,214,10,0.55)}
.stat-card:nth-child(3) .stat-num{color:var(--neon-blue);text-shadow:0 0 8px rgba(0,240,255,0.55)}
.stat-num{font-size:1.35rem;font-weight:900;line-height:1.2}
.stat-label{font-size:.68rem;color:var(--text-dim);margin-top:6px;line-height:1.3}

.hero-scroll{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  font-size:.7rem;color:var(--text-dim);animation:bounce 2s infinite;text-align:center;
}
.hero-scroll::after{content:'↓';display:block;margin-top:2px;font-size:1.2rem;color:var(--neon-gold);text-shadow:0 0 8px var(--neon-gold)}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}

/* ===== QUIZ SECTION ===== */
.quiz-container{
  padding:24px 20px;position:relative;overflow:hidden;
  border:1px solid rgba(0,240,255,0.2);
  box-shadow:0 0 20px rgba(255,0,85,0.08),0 0 30px rgba(0,240,255,0.06);
}
.quiz-progress{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;
}
.quiz-progress-text{font-size:.8rem;color:var(--text-bright);font-weight:bold}
.quiz-progress-bar{flex:1;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;margin-left:12px;overflow:hidden}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--neon-red),var(--neon-gold),var(--neon-blue));border-radius:4px;transition:width .4s ease;width:0;box-shadow:0 0 8px rgba(255,214,10,0.4)}
.quiz-question{
  font-size:1.25rem;font-weight:700;margin-bottom:6px;color:var(--text-bright);
}
.quiz-hint{font-size:.8rem;color:var(--neon-gold);margin-bottom:20px;font-style: italic;}
.quiz-options{display:flex;flex-direction:column;gap:12px}
.quiz-option{
  background:rgba(255,255,255,0.05);border: 1.5px solid rgba(255,255,255,0.1);border-radius:14px;
  padding:14px 18px;font-size:.95rem;color:var(--text-bright);cursor:pointer;
  transition:all .2s ease;display:flex;align-items:center;gap:12px;
}
.quiz-option:active{transform:scale(.98)}
.quiz-option .opt-label{
  width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;
  flex-shrink:0;transition:all .2s;color: #fff;
}
.quiz-option.correct{border-color:var(--neon-blue);background:rgba(0,240,255,.12);box-shadow:0 0 12px rgba(0,240,255,0.35)}
.quiz-option.correct .opt-label{background:var(--neon-blue);color:#000}
.quiz-option.wrong{border-color:var(--neon-red);background:rgba(255,0,85,.15);box-shadow: 0 0 10px rgba(255,0,85,0.3);}
.quiz-option.wrong .opt-label{background:var(--neon-red);color:#fff}
.quiz-option.disabled{pointer-events:none;opacity:.4}
.quiz-option.disabled.correct,.quiz-option.disabled.wrong{opacity:1}

.quiz-feedback{
  margin-top:16px;padding:14px;border-radius:12px;font-size:.85rem;
  display:none; line-height: 1.5;
}
.quiz-feedback.show{display:block;animation:fadeInUp .4s ease}
.quiz-feedback.correct{background:rgba(0,240,255,.08);border:1px solid rgba(0,240,255,.3);color:#7df4ff}
.quiz-feedback.wrong{background:rgba(255,0,85,.1);border:1px solid rgba(255,0,85,.3);color:#ff528c}

.shake-anim { animation: shake 0.4s ease-in-out; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-6px); }
  40%, 80% { transform: translateX(6px); }
}

.quiz-next{
  margin-top:16px;width:100%;padding:14px;border:none;border-radius:14px;
  background:linear-gradient(135deg, var(--neon-gold) 0%, #f4a261 100%);
  color:#000;font-size:1rem;font-weight:700;box-shadow: 0 4px 15px rgba(255,214,10,0.3);
  cursor:pointer;transition:all .2s;display:none;
}
.quiz-next.show{display:block;animation:fadeInUp .4s ease}
.quiz-result{text-align:center;padding:20px 0;display:none;}
.quiz-result.show{display:block;animation:fadeInUp .5s ease}
.quiz-result-score{
  font-size:3.5rem;font-weight:900;color: var(--neon-gold);
  text-shadow: 0 0 10px var(--neon-gold);
}
.quiz-result-title{font-size:1.3rem;font-weight:700;margin:8px 0; color: #fff;}
.quiz-result-desc{font-size:.85rem;color:var(--text-dim);margin-bottom:20px}
.quiz-restart{
  padding:12px 28px;border:1.5px solid var(--neon-gold);border-radius:24px;background:transparent;
  color:var(--neon-gold);font-size:.9rem;cursor:pointer;transition:all .25s;
  box-shadow: 0 0 8px rgba(255,214,10,0.2);
}

/* ===== CITY CARDS ===== */
.city-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.city-card{
  padding:18px 14px;position:relative;overflow:hidden;cursor:pointer;
  border:1.5px solid rgba(255,255,255,0.1)!important;
  transition:border-color .35s ease,box-shadow .35s ease,transform .3s cubic-bezier(0.175,0.885,0.32,1.275);
  -webkit-tap-highlight-color:transparent;
}
.city-card:hover,.city-card.active,.city-card:focus-visible{
  border-color:var(--city-color,var(--neon-red))!important;
  box-shadow:0 0 22px color-mix(in srgb,var(--city-color,var(--neon-red)) 50%,transparent),
             0 0 44px color-mix(in srgb,var(--city-color,var(--neon-red)) 25%,transparent),
             inset 0 0 28px color-mix(in srgb,var(--city-color,var(--neon-red)) 10%,transparent)!important;
  animation:cityNeonPulse 2s ease-in-out infinite;
}
@keyframes cityNeonPulse{
  0%,100%{filter:brightness(1)}
  50%{filter:brightness(1.08)}
}
.city-card:active{transform:scale(0.95)}
.city-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:var(--city-color,var(--neon-red));
  box-shadow:0 0 8px var(--city-color,var(--neon-red));
  transition:height .3s ease,box-shadow .3s ease;
}
.city-card:hover::before,.city-card.active::before{height:5px;box-shadow:0 0 16px var(--city-color,var(--neon-red))}
.city-name{font-size:1.15rem;font-weight:900;margin-bottom:4px;color:var(--text-bright);position:relative;z-index:2}
.city-tag{font-size:.7rem;color:var(--city-color,var(--neon-red));margin-bottom:10px;font-weight:700;letter-spacing:0.5px;position:relative;z-index:2}
.city-quote{font-size:.78rem;color:#e1ebe4;line-height:1.5;position:relative;z-index:2}
.city-card .city-emoji{
  position:absolute;top:14px;right:14px;font-size:1.4rem;opacity:.2;
  transition:opacity .4s ease,transform .4s ease;z-index:2;
}
.city-card:hover .city-emoji,.city-card.active .city-emoji{opacity:1;transform:scale(1.2) rotate(-8deg)}
.city-deco{
  position:absolute;font-size:1.6rem;opacity:.18;pointer-events:none;z-index:1;
  transition:opacity .45s ease,transform .45s cubic-bezier(0.34,1.56,0.64,1);

// === QUIZ CORE ===
let quizIdx=0,quizScore=0,quizAnswered=false;
function buildQuiz(){
  renderQuestion();
}
function renderQuestion(){
  quizIdx=0;quizScore=0;quizAnswered=false;
  showQuestion();
}
function showQuestion(){
  if(quizIdx>=quizData.length){showQuizResult();return}
  const q=quizData[quizIdx];
  const body=document.getElementById('quizBody');
  document.getElementById('quizProgressText').textContent=`第 ${quizIdx+1} / ${quizData.length} 题`;
  document.getElementById('quizProgressFill').style.width=`${(quizIdx/quizData.length)*100}%`;
  quizAnswered=false;
  let optsHTML='';
  const labels=['A','B','C','D'];
  q.options.forEach((opt,i)=>{
    optsHTML+=`<div class="quiz-option" onclick="answerQuiz(${i})"><span class="opt-label">${labels[i]}</span><span>${opt}</span></div>`;
  });
  body.innerHTML=`
    <div class="quiz-question">${q.q}</div>
    <div class="quiz-hint">💡 提示：${q.hint}</div>
    <div class="quiz-options">${optsHTML}</div>
    <div class="quiz-feedback" id="quizFeedback"></div>
    <button class="quiz-next" id="quizNext" onclick="nextQuestion()">${quizIdx < quizData.length - 1 ? '下一题' : '查看战果 →'}</button>
  `;
}
function answerQuiz(i){
  if(quizAnswered)return;
  quizAnswered=true;
  const q=quizData[quizIdx];
  const opts=document.querySelectorAll('.quiz-option');
  const container=document.getElementById('quizContainer');
  
  opts.forEach((el,idx)=>{
    el.classList.add('disabled');
    if(idx===q.answer)el.classList.add('correct');
    if(idx===i&&i!==q.answer)el.classList.add('wrong');
  });
  
  const fb=document.getElementById('quizFeedback');
  if(i===q.answer){
    quizScore++;
    fb.className='quiz-feedback show correct';
    fb.innerHTML='✅ 够识货！'+q.explain;
  }else{
    container.classList.add('shake-anim');
    setTimeout(()=>container.classList.remove('shake-anim'),400);
    
    fb.className='quiz-feedback show wrong';
    fb.innerHTML='❌ 饮多两杯马尿真当自己懂球？正确答案：'+q.options[q.answer]+'。'+q.explain;
  }
  document.getElementById('quizNext').classList.add('show');
}
function nextQuestion(){
  quizIdx++;
  showQuestion();
}
function showQuizResult(){
  document.getElementById('quizProgressFill').style.width='100%';
  document.getElementById('quizProgressText').textContent='考核结束！';
  const body=document.getElementById('quizBody');
  let title,desc;
  if(quizScore>=9){title='粤超霄夜梗王！';desc='你对粤语足球大排档文化聊若指掌，今晚炒粉加两个蛋！🏆'}
  else if(quizScore>=7){title='大排档金牌吹水员';desc:'好嘢！老球迷了，夜宵桌上说话底气很足！💪'}
  else if(quizScore>=5){title='加瓶冰啤能看懂';desc:'算是个懂经的，多看几场粤超回来继续吹水！⚽'}
  else if(quizScore>=3){title='纯蹭干炒牛河的靓仔';desc:'你连夜宵买单的资格都没，去跟假球迷坐一桌啦～🍵'}
  else{title='球盲，老实负责洗碗😂';desc:'你在大排档只管低头吃就行，球场术语不适合你。'}
  body.innerHTML=`
    <div class="quiz-result show">
      <div class="quiz-result-score">${quizScore}/${quizData.length}</div>
      <div class="quiz-result-title">${title}</div>
      <div class="quiz-result-desc">${desc}</div>
      <button class="quiz-restart" onclick="renderQuestion()">不服再战 🔄</button>
    </div>
  `;
}

      <div class="city-name">${c.name}</div>
      <div class="city-tag">${c.tag}</div>
      <div class="city-quote">"${c.quote}"</div>

  `).join('');
}
function cityTap(event){
  const card=event.currentTarget;
  card.classList.toggle('active');
  card.style.transform='scale(0.95)';
  setTimeout(()=>{if(!card.matches(':hover'))card.style.transform=''},150);
}

function initStatCards(){
  document.querySelectorAll('.stat-card').forEach(card=>{
    card.addEventListener('click',()=>card.classList.toggle('active'));
  });
}

// === MEMES ===
let memeLikes=[],memeLiked=[];
function buildMemes(){
  memeLikes=memeData.map(()=>Math.floor(Math.random()*(666-103+1))+103);
  memeLiked=memeData.map(()=>false);
  const wall=document.getElementById('memeWall');
  wall.innerHTML=memeData.map((m,i)=>`
    <div class="meme-item glass-panel meme-neon-${m.neon}" tabindex="0" onclick="memeTap(event)" style="animation:fadeInUp .4s ease ${i*0.03}s both">
      <span class="meme-emoji">${m.emoji}</span>
      <div class="meme-body">
        <span class="meme-tag">${m.tag}</span>
        <div class="meme-text">${m.text}</div>
      </div>
      <button type="button" class="meme-like" onclick="memeLike(event,${i})" aria-label="点赞">
        <span class="meme-like-icon">❤️</span>
        <span class="meme-like-num" id="memeLike${i}">${memeLikes[i]}</span>
      </button>
    </div>
  `).join('');
}
function memeTap(event){
  if(event.target.closest('.meme-like'))return;
  const card=event.currentTarget;
  card.classList.toggle('active');
  card.style.transform='scale(0.97)';
  setTimeout(()=>{if(!card.matches(':hover'))card.style.transform=''},150);
}
function spawnFloatingHearts(btn){
  const card=btn.closest('.meme-item');
  const hearts=8;
  for(let i=0;i<hearts;i++){
    const h=document.createElement('span');
    h.className='float-heart';
    h.textContent='❤️';
    h.style.right=(8+Math.random()*24)+'px';
    h.style.bottom=(16+Math.random()*20)+'px';
    h.style.fontSize=(0.75+Math.random()*0.7)+'rem';
    h.style.setProperty('--hx',(Math.random()*50-25)+'px');
    h.style.setProperty('--rot',(Math.random()*40-20)+'deg');
    h.style.animationDelay=(i*0.07)+'s';
    card.appendChild(h);
    h.addEventListener('animationend',()=>h.remove());
  }
}
function memeLike(event,idx){
  event.stopPropagation();
  if(memeLiked[idx])return;
  memeLiked[idx]=true;
  memeLikes[idx]++;
  const btn=event.currentTarget;
  const numEl=document.getElementById('memeLike'+idx);
  numEl.textContent=memeLikes[idx];
  btn.classList.add('liked');
  btn.querySelector('.meme-like-icon').classList.add('meme-like-pop');
  setTimeout(()=>btn.querySelector('.meme-like-icon').classList.remove('meme-like-pop'),400);
  spawnFloatingHearts(btn);
}

// === REVEAL ON SCROLL ===
function initReveal(){
  const observer=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){e.target.classList.add('visible')}
    });
  },{threshold:0.05});
  document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));
}

function shareAction(){

  }else{
    const btn=event.currentTarget;
    const orig=btn.textContent;
    btn.textContent='已发出夜宵邀请 ✓';
    const ta=document.createElement('textarea');
    ta.value=location.href;document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy')}catch(e){}
    document.body.removeChild(ta);
    setTimeout(()=>btn.textContent=orig,2000);
  }
}
