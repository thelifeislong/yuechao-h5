/* ===== RESET & BASE ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:var(--font-body);
  background:#08060f;color:#f0e6d2;overflow-x:hidden;line-height:1.6;
  -webkit-tap-highlight-color:transparent;
}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}

/* ===== 街头涂鸦标题字（仅关键标题 + 城市名） ===== */
.loading-title,.hero-title,.section-title,.share-title,.city-name{
  font-family:var(--font-display);font-weight:400;letter-spacing:.05em;
}

/* ===== CSS VARIABLES — 港风霓虹 ===== */
:root{
  --font-display:"ZCOOL QingKe HuangYou","PingFang SC","Microsoft YaHei",sans-serif;
  --font-body:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
  --red:#ff2d55;--red-deep:#e63946;--gold:#ffd60a;--gold-soft:#ffb347;
  --neon-cyan:#00f5ff;--neon-pink:#ff006e;--neon-purple:#8338ec;
  --dark:#08060f;--dark-2:#12101c;--dark-3:#1a1728;--dark-4:#252238;
  --text:#f5efe0;--text-dim:#9a94b0;--text-bright:#ffffff;
  --green:#52b788;--blue:#4cc9f0;--purple:#b5179e;
  --glass:rgba(255,255,255,.06);--glass-border:rgba(255,255,255,.14);
  --gradient-red:linear-gradient(135deg,#ff2d55 0%,#e63946 50%,#c1121f 100%);
  --gradient-gold:linear-gradient(135deg,#ffd60a 0%,#ffb347 100%);
  --gradient-neon:linear-gradient(135deg,#ffd60a 0%,#ff2d55 50%,#8338ec 100%);
  --glow-red:0 0 20px rgba(255,45,85,.5),0 0 40px rgba(255,45,85,.2);
  --glow-gold:0 0 16px rgba(255,214,10,.45),0 0 32px rgba(255,214,10,.15);
  --glow-cyan:0 0 16px rgba(0,245,255,.35);
  --shadow-card:0 8px 32px rgba(0,0,0,.55),0 0 1px rgba(255,255,255,.08);
  --radius-lg:20px;
}

/* ===== GLOBAL BACKGROUND ===== */
body::before{
  content:'';position:fixed;inset:0;z-index:-2;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%,rgba(255,45,85,.12) 0%,transparent 55%),
    radial-gradient(ellipse 60% 40% at 100% 50%,rgba(131,56,236,.08) 0%,transparent 50%),
    radial-gradient(ellipse 50% 35% at 0% 80%,rgba(0,245,255,.06) 0%,transparent 45%),
    linear-gradient(180deg,#08060f 0%,#0e0c18 50%,#08060f 100%);
  animation:auroraDrift 18s ease-in-out infinite alternate;
}
body::after{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
/* ===== 背景流光 ===== */
.bg-flow{
  position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;
}
.flow-beam{
  position:absolute;left:-90vmax;width:75vmax;height:2px;
  background:linear-gradient(90deg,transparent 0%,rgba(255,214,10,.15) 25%,rgba(255,45,85,.55) 50%,rgba(0,245,255,.35) 75%,transparent 100%);
  filter:blur(1px);opacity:0;
  animation:flowSweep linear infinite;
}
.flow-beam-1{top:12%;transform:rotate(-20deg);animation-duration:11s;animation-delay:0s}
.flow-beam-2{top:38%;height:3px;transform:rotate(-14deg);animation-duration:15s;animation-delay:-5s;
  background:linear-gradient(90deg,transparent,rgba(131,56,236,.4),rgba(255,45,85,.5),rgba(255,214,10,.3),transparent)}
.flow-beam-3{top:62%;transform:rotate(-24deg);animation-duration:13s;animation-delay:-8s}
.flow-beam-4{top:85%;height:2px;transform:rotate(-10deg);animation-duration:17s;animation-delay:-3s;
  background:linear-gradient(90deg,transparent,rgba(0,245,255,.35),rgba(255,214,10,.4),transparent)}
.flow-orb{
  position:absolute;border-radius:50%;filter:blur(50px);pointer-events:none;
  animation:flowOrb ease-in-out infinite alternate;
}
.flow-orb-1{
  width:45vmax;height:45vmax;top:-10%;left:-15%;
  background:radial-gradient(circle,rgba(255,45,85,.14) 0%,transparent 65%);
  animation-duration:14s;
}
.flow-orb-2{
  width:38vmax;height:38vmax;bottom:-5%;right:-10%;
  background:radial-gradient(circle,rgba(255,214,10,.1) 0%,rgba(131,56,236,.08) 40%,transparent 70%);
  animation-duration:18s;animation-delay:-6s;
}
.flow-orb-3{
  width:30vmax;height:30vmax;top:40%;left:50%;
  background:radial-gradient(circle,rgba(0,245,255,.08) 0%,transparent 65%);
  animation-duration:12s;animation-delay:-4s;
}
@keyframes auroraDrift{
  0%{opacity:.85;transform:scale(1) translate(0,0)}
  50%{opacity:1;transform:scale(1.04) translate(1.5%,-1%)}
  100%{opacity:.9;transform:scale(1.02) translate(-1%,1.5%)}
}
@keyframes flowSweep{
  0%{left:-90vmax;opacity:0}
  6%{opacity:.5}
  50%{opacity:.35}
  94%{opacity:.45}
  100%{left:110vw;opacity:0}
}
@keyframes flowOrb{
  0%{transform:translate(0,0) scale(1)}
  100%{transform:translate(8vw,6vh) scale(1.15)}
}
.grid-overlay{
  position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.04;
  background-image:
    linear-gradient(rgba(255,214,10,.3) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,214,10,.3) 1px,transparent 1px);
  background-size:40px 40px;
}

/* ===== LOADING SCREEN ===== */
#loading{
  position:fixed;inset:0;z-index:9999;background:var(--dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .7s ease,transform .7s ease;overflow:hidden;
}
#loading::before{
  content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(105deg,transparent 42%,rgba(255,214,10,.07) 50%,transparent 58%);
  background-size:220% 100%;
  animation:loadingSweep 5s ease-in-out infinite;
}
#loading::after{
  content:'';position:absolute;inset:-20%;z-index:0;pointer-events:none;
  background:
    radial-gradient(circle at 30% 40%,rgba(255,45,85,.12) 0%,transparent 45%),
    radial-gradient(circle at 70% 60%,rgba(255,214,10,.08) 0%,transparent 40%);
  animation:auroraDrift 14s ease-in-out infinite alternate;
}
@keyframes loadingSweep{
  0%{background-position:200% 0;opacity:.4}
  50%{opacity:.8}
  100%{background-position:-100% 0;opacity:.4}
}
#loading.hide{opacity:0;pointer-events:none;transform:scale(1.03)}
.loading-ball-wrap{
  position:relative;width:180px;height:100px;z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  animation:ballBounceX 1.1s ease-in-out infinite alternate;
}
.loading-ball{
  width:88px;height:88px;position:relative;flex-shrink:0;
}
.loading-ball::before{
  content:'';position:absolute;inset:-12px;border-radius:50%;z-index:0;
  background:radial-gradient(circle,rgba(255,214,10,.35) 0%,rgba(255,45,85,.2) 45%,transparent 72%);
  animation:glowPulse 1.6s ease-in-out infinite;
}
.loading-ball::after{
  content:'⚽';position:absolute;inset:0;z-index:1;
  display:flex;align-items:center;justify-content:center;
  font-size:3.6rem;line-height:1;
  animation:rotateBall 1.6s linear infinite;
}
.loading-ball-shadow{
  width:64px;height:10px;border-radius:50%;background:rgba(255,214,10,.28);
  margin-top:10px;filter:blur(5px);flex-shrink:0;
  animation:shadowPulse 1.1s ease-in-out infinite alternate;
  box-shadow:0 0 18px rgba(255,214,10,.35);
}
@keyframes ballBounceX{0%{transform:translateX(-52px)}100%{transform:translateX(52px)}}
@keyframes rotateBall{
  0%{transform:rotate(0deg);filter:drop-shadow(0 0 12px rgba(255,214,10,.55)) drop-shadow(0 0 24px rgba(255,45,85,.35))}
  50%{transform:rotate(180deg);filter:drop-shadow(0 0 22px rgba(255,214,10,.95)) drop-shadow(0 0 44px rgba(255,45,85,.65)) drop-shadow(0 0 56px rgba(0,245,255,.3))}
  100%{transform:rotate(360deg);filter:drop-shadow(0 0 12px rgba(255,214,10,.55)) drop-shadow(0 0 24px rgba(255,45,85,.35))}
}
@keyframes glowPulse{0%,100%{opacity:.55;transform:scale(.95)}50%{opacity:1;transform:scale(1.12)}}
@keyframes shadowPulse{0%{transform:scaleX(1);opacity:.45}100%{transform:scaleX(.55);opacity:.15}}
.loading-text{
  margin-top:30px;font-size:.9rem;color:var(--text-dim);text-align:center;
  min-height:1.5em;transition:opacity .3s;z-index:1;
}
.loading-text::after{
  content:'▋';display:inline-block;margin-left:2px;color:var(--gold);
  animation:blink .8s step-end infinite;
}
@keyframes blink{50%{opacity:0}}
.loading-title{
  margin-top:16px;font-size:2rem;letter-spacing:.08em;z-index:1;
  background:var(--gradient-neon);background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 3s linear infinite;
  filter:drop-shadow(2px 2px 0 rgba(0,0,0,.45)) drop-shadow(0 0 14px rgba(255,214,10,.45));
}

/* ===== CONTAINER ===== */
#app{
  max-width:480px;margin:0 auto;position:relative;overflow:hidden;
  box-shadow:0 0 80px rgba(255,45,85,.08),0 0 120px rgba(131,56,236,.05);
}

/* ===== SECTION COMMON ===== */
.section{padding:60px 20px;position:relative}
.section::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:60%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,214,10,.25),transparent);
}
.section-title{
  font-size:1.75rem;text-align:center;margin-bottom:8px;
  color:var(--text-bright);
  text-shadow:2px 2px 0 rgba(0,0,0,.5),0 0 18px rgba(255,214,10,.3);
}
.section-subtitle{
  font-size:.85rem;color:var(--text-dim);text-align:center;margin-bottom:30px;
}
.section-divider{
  width:60px;height:3px;margin:0 auto 30px;border-radius:2px;
  background:var(--gradient-gold);
  box-shadow:var(--glow-gold);
  position:relative;
}
.section-divider::before,.section-divider::after{
  content:'';position:absolute;top:50%;width:6px;height:6px;
  border-radius:50%;background:var(--gold);transform:translateY(-50%);
  box-shadow:var(--glow-gold);
}
.section-divider::before{left:-14px}
.section-divider::after{right:-14px}

/* ===== INTRO BOX ===== */
.intro-box{
  background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);border-radius:var(--radius-lg);
  padding:22px 20px;font-size:.9rem;line-height:1.85;color:var(--text);
  box-shadow:var(--shadow-card);position:relative;overflow:hidden;
}
.intro-box::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--gradient-gold);box-shadow:var(--glow-gold);
}
.intro-box p{margin-bottom:12px}
.intro-box p:last-child{margin-bottom:0}
.intro-box b{color:var(--gold);text-shadow:0 0 8px rgba(255,214,10,.3)}
.intro-box b.neon-red{color:var(--red);text-shadow:0 0 8px rgba(255,45,85,.4)}
.intro-box b.neon-blue{color:var(--blue);text-shadow:0 0 8px rgba(76,201,240,.4)}

/* ===== HERO SECTION ===== */
.hero{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;padding:40px 20px;text-align:center;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 50% 25%,rgba(255,45,85,.2) 0%,transparent 55%),
    radial-gradient(circle at 85% 75%,rgba(255,214,10,.1) 0%,transparent 45%),
    radial-gradient(circle at 15% 60%,rgba(0,245,255,.06) 0%,transparent 40%);
}
.hero::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:120px;
  background:linear-gradient(transparent,rgba(8,6,15,.8));
  pointer-events:none;
}
.hero-particles{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.particle{
  position:absolute;border-radius:50%;pointer-events:none;
  animation:particleFloat linear infinite;
}
.particle:nth-child(1){width:4px;height:4px;background:var(--gold);top:20%;left:10%;opacity:.5;animation-duration:6s}
.particle:nth-child(2){width:3px;height:3px;background:var(--red);top:60%;left:85%;opacity:.4;animation-duration:8s;animation-delay:-2s}
.particle:nth-child(3){width:5px;height:5px;background:var(--neon-cyan);top:35%;left:70%;opacity:.35;animation-duration:7s;animation-delay:-4s}
.particle:nth-child(4){width:2px;height:2px;background:var(--gold);top:75%;left:25%;opacity:.5;animation-duration:9s;animation-delay:-1s}
.particle:nth-child(5){width:3px;height:3px;background:var(--neon-pink);top:15%;left:55%;opacity:.4;animation-duration:5s;animation-delay:-3s}
.particle:nth-child(6){width:4px;height:4px;background:var(--neon-cyan);top:80%;left:60%;opacity:.3;animation-duration:10s;animation-delay:-5s}
@keyframes particleFloat{
  0%,100%{transform:translateY(0) translateX(0)}
  25%{transform:translateY(-20px) translateX(8px)}
  50%{transform:translateY(-8px) translateX(-6px)}
  75%{transform:translateY(-28px) translateX(4px)}
}
.hero-badge{
  display:inline-block;padding:8px 18px;
  background:rgba(255,214,10,.08);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,214,10,.45);border-radius:24px;
  font-size:.75rem;color:var(--gold);margin-bottom:24px;letter-spacing:1.5px;
  animation:fadeInDown .8s ease,badgePulse 3s ease-in-out infinite;
  box-shadow:0 0 20px rgba(255,214,10,.15),inset 0 0 20px rgba(255,214,10,.05);
  position:relative;z-index:1;
}
@keyframes badgePulse{
  0%,100%{box-shadow:0 0 20px rgba(255,214,10,.15),inset 0 0 20px rgba(255,214,10,.05)}
  50%{box-shadow:0 0 28px rgba(255,214,10,.3),inset 0 0 24px rgba(255,214,10,.08)}
}
.hero-title{
  font-size:3.6rem;line-height:1.05;margin-bottom:14px;
  position:relative;z-index:1;
  background:linear-gradient(90deg,#ffd60a,#ff2d55,#ffd60a,#ffb347);
  background-size:300% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:fadeInUpGraffiti .8s ease .2s both,shimmer 4s linear infinite;
  filter:drop-shadow(3px 3px 0 rgba(0,0,0,.55)) drop-shadow(0 0 28px rgba(255,45,85,.4));
  transform:skewX(-2deg);
}
@keyframes fadeInUpGraffiti{
  from{opacity:0;transform:translateY(20px) skewX(-2deg)}
  to{opacity:1;transform:translateY(0) skewX(-2deg)}
}
.hero-subtitle{
  font-size:1rem;color:var(--text-dim);margin-bottom:32px;
  animation:fadeInUp .8s ease .4s both;position:relative;z-index:1;
  text-shadow:0 0 20px rgba(0,0,0,.5);
}
.hero-stats{
  display:flex;gap:12px;animation:fadeInUp .8s ease .6s both;
  flex-wrap:wrap;justify-content:center;position:relative;z-index:1;
}
.stat-card{
  background:rgba(255,255,255,.04);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.1);border-radius:14px;
  padding:14px 18px;min-width:92px;position:relative;overflow:hidden;
  box-shadow:var(--shadow-card);
  transition:transform .25s ease,box-shadow .25s ease;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,214,10,.5),transparent);
}
.stat-card:active{transform:translateY(-2px);box-shadow:var(--shadow-card),var(--glow-gold)}
.stat-num{
  font-size:1.45rem;font-weight:900;color:var(--gold);
  font-variant-numeric:tabular-nums;
  text-shadow:0 0 12px rgba(255,214,10,.5);
}
.stat-label{font-size:.7rem;color:var(--text-dim);margin-top:4px;letter-spacing:.5px}
.hero-scroll{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  font-size:.7rem;color:var(--text-dim);text-align:center;z-index:1;
  animation:scrollHint 2.5s ease-in-out infinite;
}
.hero-scroll::after{
  content:'';display:block;margin:8px auto 0;width:20px;height:28px;
  border:1.5px solid rgba(255,214,10,.4);border-radius:10px;position:relative;
  box-shadow:0 0 10px rgba(255,214,10,.2);
}
.hero-scroll::before{
  content:'';position:absolute;bottom:calc(100% - 18px);left:50%;transform:translateX(-50%);
  width:4px;height:6px;background:var(--gold);border-radius:2px;
  animation:scrollDot 2.5s ease-in-out infinite;
  box-shadow:var(--glow-gold);
}
@keyframes scrollHint{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes scrollDot{
  0%,100%{transform:translateX(-50%) translateY(0);opacity:1}
  50%{transform:translateX(-50%) translateY(6px);opacity:.3}
}

/* ===== QUIZ SECTION ===== */
.quiz-container{
  background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,45,85,.2);border-radius:var(--radius-lg);
  padding:26px 20px;position:relative;overflow:hidden;
  box-shadow:var(--shadow-card),0 0 40px rgba(255,45,85,.08),inset 0 0 60px rgba(255,45,85,.03);
}
.quiz-container::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--gradient-neon);background-size:200% auto;
  animation:shimmer 3s linear infinite;
}
.quiz-progress{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;
}
.quiz-progress-text{font-size:.8rem;color:var(--text-dim);font-weight:600}
.quiz-progress-bar{
  flex:1;height:8px;background:rgba(0,0,0,.4);border-radius:4px;
  margin-left:12px;overflow:hidden;border:1px solid rgba(255,255,255,.06);
}
.quiz-progress-fill{
  height:100%;background:var(--gradient-gold);border-radius:3px;
  transition:width .4s ease;width:0;
  box-shadow:var(--glow-gold);position:relative;
}
.quiz-progress-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
  animation:progressShine 2s ease-in-out infinite;
}
@keyframes progressShine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.quiz-question{
  font-size:1.2rem;font-weight:700;margin-bottom:8px;color:var(--text-bright);
  text-shadow:0 0 16px rgba(255,255,255,.08);
}
.quiz-hint{font-size:.8rem;color:var(--text-dim);margin-bottom:20px}
.quiz-options{display:flex;flex-direction:column;gap:10px}
.quiz-option{
  background:rgba(0,0,0,.25);border:1.5px solid rgba(255,255,255,.08);border-radius:14px;
  padding:14px 18px;font-size:.95rem;color:var(--text);cursor:pointer;
  transition:all .25s ease;display:flex;align-items:center;gap:12px;
}
.quiz-option:active{transform:translateX(4px) scale(.98)}
.quiz-option .opt-label{
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;
  flex-shrink:0;transition:all .25s;
}
.quiz-option:nth-child(1) .opt-label{color:var(--red);border-color:rgba(255,45,85,.3)}
.quiz-option:nth-child(2) .opt-label{color:var(--blue);border-color:rgba(76,201,240,.3)}
.quiz-option:nth-child(3) .opt-label{color:var(--gold);border-color:rgba(255,214,10,.3)}
.quiz-option:nth-child(4) .opt-label{color:var(--neon-purple);border-color:rgba(131,56,236,.3)}
.quiz-option.correct{
  border-color:var(--green);background:rgba(82,183,136,.12);
  box-shadow:0 0 20px rgba(82,183,136,.2);animation:popCorrect .4s ease;
}
.quiz-option.correct .opt-label{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 0 12px rgba(82,183,136,.5)}
.quiz-option.wrong{
  border-color:var(--red);background:rgba(255,45,85,.12);
  box-shadow:0 0 20px rgba(255,45,85,.2);animation:shakeWrong .4s ease;
}
.quiz-option.wrong .opt-label{background:var(--red);color:#fff;border-color:var(--red);box-shadow:var(--glow-red)}
.quiz-option.disabled{pointer-events:none;opacity:.45}
.quiz-option.disabled.correct,.quiz-option.disabled.wrong{opacity:1}
@keyframes popCorrect{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
@keyframes shakeWrong{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.quiz-feedback{
  margin-top:16px;padding:14px 16px;border-radius:12px;font-size:.85rem;
  display:none;animation:fadeInUp .4s ease;
}
.quiz-feedback.show{display:block}
.quiz-feedback.correct{
  background:rgba(82,183,136,.08);border:1px solid rgba(82,183,136,.35);color:var(--green);
  box-shadow:0 0 16px rgba(82,183,136,.1);
}
.quiz-feedback.wrong{
  background:rgba(255,45,85,.08);border:1px solid rgba(255,45,85,.35);color:var(--red);
  box-shadow:0 0 16px rgba(255,45,85,.1);
}
.quiz-next{
  margin-top:18px;width:100%;padding:15px;border:none;border-radius:14px;
  background:var(--gradient-gold);color:var(--dark);font-size:1rem;font-weight:700;
  cursor:pointer;transition:all .25s;display:none;position:relative;overflow:hidden;
  box-shadow:var(--glow-gold);
}
.quiz-next.show{display:block;animation:fadeInUp .4s ease}
.quiz-next:active{transform:scale(.98)}
.quiz-next::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
  transform:translateX(-100%);animation:btnShine 2.5s ease-in-out infinite;
}
@keyframes btnShine{0%{transform:translateX(-100%)}50%,100%{transform:translateX(100%)}}
.quiz-result{text-align:center;padding:24px 0;display:none}
.quiz-result.show{display:block;animation:fadeInUp .5s ease}
.quiz-result-score{
  font-size:3.2rem;font-weight:900;background:var(--gradient-neon);background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 3s linear infinite,scorePop .6s ease;
  filter:drop-shadow(0 0 20px rgba(255,214,10,.4));
}
@keyframes scorePop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.quiz-result-title{font-size:1.25rem;font-weight:700;margin:10px 0;color:var(--text-bright)}
.quiz-result-desc{font-size:.85rem;color:var(--text-dim);margin-bottom:22px}
.quiz-restart{
  padding:12px 32px;border:1.5px solid rgba(255,214,10,.5);border-radius:24px;
  background:rgba(255,214,10,.06);color:var(--gold);font-size:.9rem;font-weight:600;
  cursor:pointer;transition:all .25s;
  box-shadow:0 0 16px rgba(255,214,10,.1);
}
.quiz-restart:active{transform:scale(.98);box-shadow:var(--glow-gold)}

/* ===== CITY CARDS ===== */
.city-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.city-card{
  background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08);border-radius:16px;
  padding:18px 14px;position:relative;overflow:hidden;cursor:pointer;
  transition:opacity .6s ease,transform .6s ease,border-color .25s ease,box-shadow .25s ease;
  box-shadow:var(--shadow-card);
  transform:translateY(var(--card-y,0));
}
.city-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:var(--city-color,var(--red));border-radius:16px 16px 0 0;
  box-shadow:0 0 12px var(--city-color,var(--red));
}
.city-card::after{
  content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;
  border-radius:50%;background:var(--city-color,var(--red));opacity:.08;
  filter:blur(20px);pointer-events:none;
}
.city-card.tapped{
  transform:scale(.96) translateY(var(--card-y,0))!important;
  border-color:color-mix(in srgb,var(--city-color) 55%,rgba(255,255,255,.08));

      <div class="section-subtitle" style="padding:0 20px">8张海报，8种风格，AI全程创作</div>
      <div class="section-divider" style="margin-left:auto;margin-right:auto"></div>
      <div class="gallery-wrap">
        <div class="gallery-scroll" id="galleryScroll"></div>
      </div>
    </section>

    <!-- MEME WALL -->
    <section class="section reveal">
      <div class="section-title">🔥 造梗墙</div>
      <div class="section-subtitle">粤超金句合集，句句都有广东味道</div>
      <div class="section-divider"></div>
      <div class="meme-wall" id="memeWall"></div>
    </section>

    <!-- SHARE -->
    <section class="share-section reveal">
      <div class="share-title">波系圆嘅<br>乜都有可能</div>
      <div class="share-desc">粤超联赛 · 广东足球梗王争霸<br>用AI创意，为广东足球造梗造势</div>
      <button class="share-btn" onclick="shareAction()">分享给球友</button>
      <div class="share-footer">
        广东体育城市联赛 AI创意比赛作品<br>
        全部海报由AI生成 · 粤超联赛创意梗库<br>
        © 2026 粤超梗王争霸
      </div>
    </section>
  `;

  buildQuiz();
  buildCities();
  buildGallery();
  buildMemes();
  initReveal();
}

// === QUIZ ===
let quizIdx=0,quizScore=0,quizAnswered=false;
function buildQuiz(){
  renderQuestion();
}
function renderQuestion(){
  quizIdx=0;quizScore=0;quizAnswered=false;
  showQuestion();
}
function showQuestion(){
  if(quizIdx>=quizData.length){showQuizResult();return}
  const q=quizData[quizIdx];
  const body=document.getElementById('quizBody');
  document.getElementById('quizProgressText').textContent=`第 ${quizIdx+1} / ${quizData.length} 题`;
  document.getElementById('quizProgressFill').style.width=`${(quizIdx/quizData.length)*100}%`;
  quizAnswered=false;
  let optsHTML='';
  const labels=['A','B','C','D'];
  q.options.forEach((opt,i)=>{
    optsHTML+=`<div class="quiz-option" onclick="answerQuiz(${i})"><span class="opt-label">${labels[i]}</span><span>${opt}</span></div>`;
  });
  body.innerHTML=`
    <div class="quiz-question">${q.q}</div>
    <div class="quiz-hint">💡 ${q.hint}</div>
    <div class="quiz-options">${optsHTML}</div>
    <div class="quiz-feedback" id="quizFeedback"></div>
    <button class="quiz-next" id="quizNext" onclick="nextQuestion()">${quizIdx<quizData.length-1?'下一题':'查看结果 →'}</button>
  `;
}
function answerQuiz(i){
  if(quizAnswered)return;
  quizAnswered=true;
  const q=quizData[quizIdx];
  const opts=document.querySelectorAll('.quiz-option');
  opts.forEach((el,idx)=>{
    el.classList.add('disabled');
    if(idx===q.answer)el.classList.add('correct');
    if(idx===i&&i!==q.answer)el.classList.add('wrong');
  });
  const fb=document.getElementById('quizFeedback');
  if(i===q.answer){
    quizScore++;
    fb.className='quiz-feedback show correct';
    fb.innerHTML='✅ 答对了！'+q.explain;
  }else{
    fb.className='quiz-feedback show wrong';
    fb.innerHTML='❌ 错了！正确答案：'+q.options[q.answer]+'。'+q.explain;
  }
  document.getElementById('quizNext').classList.add('show');
}
function nextQuestion(){
  quizIdx++;
  showQuestion();
}
function showQuizResult(){
  document.getElementById('quizProgressFill').style.width='100%';
  document.getElementById('quizProgressText').textContent='挑战完成！';
  const body=document.getElementById('quizBody');
  let title,desc;
  if(quizScore>=9){title='粤超梗王！';desc='你对粤语足球文化了如指掌，系真正嘅广东球迷！🏆'}
  else if(quizScore>=7){title='资深球迷';desc:'好嘢！粤语足球术语难唔到你，继续努力！💪'}
  else if(quizScore>=5){title='入门球迷';desc:'都算识嘢嘅，多D睇粤超就梗王啦！⚽'}
  else if(quizScore>=3){title='路过的靓仔';desc:'睇嚟你要多饮几杯茶补下课咯～🍵'}
  else{title='波都不识踢';desc='你都系乖乖饮茶算啦，踢波唔啱你😂'}
  body.innerHTML=`
    <div class="quiz-result show">
      <div class="quiz-result-score">${quizScore}/${quizData.length}</div>
      <div class="quiz-result-title">${title}</div>
      <div class="quiz-result-desc">${desc}</div>
      <button class="quiz-restart" onclick="renderQuestion()">再战一次 🔄</button>
    </div>
  `;
}

// === CITIES ===
function buildCities(){
  const grid=document.getElementById('cityGrid');
  grid.innerHTML=cityData.map((c,i)=>`
    <div class="city-card reveal-card" style="--city-color:${c.color};--card-y:${i%2===0?'2px':'-2px'};--reveal-delay:${i*0.06}s" onclick="cityTap(event)">
      <span class="city-emoji">${c.emoji}</span>
      <div class="city-name">${c.name}</div>
      <div class="city-tag">${c.tag}</div>
      <div class="city-quote">"${c.quote}"</div>
    </div>
  `).join('');
}
function cityTap(event){
  const card=event.currentTarget;
  card.classList.add('tapped');
  setTimeout(()=>card.classList.remove('tapped'),200);
}

// === GALLERY ===
function buildGallery(){
  const scroll=document.getElementById('galleryScroll');
  scroll.innerHTML=posterData.map(p=>`
    <div class="gallery-item">
      <img src="${p.file}" alt="${p.title}" loading="lazy" onerror="this.style.display='none'">
      <div class="gallery-caption">
        <div class="gallery-caption-title">${p.title}</div>
        <div class="gallery-caption-desc">${p.desc}</div>
      </div>
    </div>
  `).join('');
}

// === MEMES ===
const tagAccent={
  '谐音梗':'#ffd60a','金句':'#ffd60a',
  '城市梗':'#ff2d55','霸气梗':'#ff2d55','世仇梗':'#ff2d55','互怼梗':'#ff2d55',
  '术语梗':'#00f5ff','功夫梗':'#00f5ff',
  '松弛梗':'#8338ec','美食梗':'#8338ec',
  '搞钱梗':'#4cc9f0','球乡梗':'#52b788','逆袭梗':'#52b788','反转梗':'#52b788'
};
const memeTilts=[-1.5,1.2,-0.8,1.5,-1.2,0.9,-1.8,1,-0.5,1.3,-1,0.7,1.6,-0.9];
function buildMemes(){
  const wall=document.getElementById('memeWall');
  wall.innerHTML=memeData.map((m,i)=>{
    const accent=tagAccent[m.tag]||'#ffd60a';
    const tilt=memeTilts[i%memeTilts.length];
    return `
      <div class="meme-item reveal-meme" style="--meme-accent:${accent};--meme-tilt:${tilt}deg;--reveal-delay:${i*0.05}s">
        <span class="meme-tag">${m.tag}</span>
        <div>${m.text}</div>
      </div>
    `;
  }).join('');
}

// === REVEAL ON SCROLL ===
function initReveal(){
  const observer=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){e.target.classList.add('visible')}
    });
  },{threshold:0.1});
  document.querySelectorAll('.reveal,.reveal-card,.reveal-meme').forEach(el=>observer.observe(el));
}

// === SHARE ===
function shareAction(){
  if(navigator.share){
    navigator.share({title:'粤超·广东足球梗王争霸',text:'波系圆嘅，乜都有可能！粤超联赛AI创意H5',url:location.href});
  }else{
    const btn=event.currentTarget;
    const orig=btn.textContent;
    btn.textContent='已复制链接 ✓';
    const ta=document.createElement('textarea');
    ta.value=location.href;document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy')}catch(e){}
    document.body.removeChild(ta);
    setTimeout(()=>btn.textContent=orig,2000);
  }
}
</script>
